<div class="card" role="listitem">
  <mat-icon class="avatar" aria-hidden="true">person</mat-icon>
  <div class="info">
    <span class="nome">{{ usuario().nome }}</span>
    <span class="email">{{ usuario().email }}</span>
  </div>
  <button
    mat-icon-button
    type="button"
    class="btn-editar"
    aria-label="Editar usuário"
    (click)="onEditar()"
  >
    <mat-icon>edit</mat-icon>
  </button>
</div>
